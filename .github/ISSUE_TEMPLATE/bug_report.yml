name: Bug report
description: Report behavior that appears broken.
title: "Bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include sensitive personal data, private credentials, or non-public records.
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include commands, inputs, or links to public data where possible.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation or logs
      description: Paste relevant output. Remove secrets and sensitive data first.
